<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Work Tracker</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="header">
        <div class="logo-title">
            <img src="logo.png" alt="Logo" class="logo-img">
            <h1>› TRACKER</h1>
        </div>
        <button class="add-project-btn" onclick="openProjectModal()">+ NEW PROJECT</button>
    </div>

    <div class="projects-container" id="projectsContainer">
        <!-- Projects will be rendered here -->
    </div>

    <!-- Project Modal -->
    <div class="modal" id="projectModal">
        <div class="modal-content">
            <div class="modal-header">New Project</div>
            <div class="form-group">
                <label>Project Name</label>
                <input type="text" id="projectNameInput" placeholder="Enter project name">
            </div>
            <div class="modal-buttons">
                <button class="btn btn-primary" onclick="addProject()">Create</button>
                <button class="btn btn-secondary" onclick="closeProjectModal()">Cancel</button>
            </div>
        </div>
    </div>

    <!-- Task Modal -->
    <div class="modal" id="taskModal">
        <div class="modal-content">
            <div class="modal-header">New Task</div>
            <div class="form-group">
                <label>Task Name</label>
                <input type="text" id="taskNameInput" placeholder="Enter task name">
            </div>
            <div class="form-group">
                <label>Deadline</label>
                <input type="date" id="taskDeadlineInput">
            </div>
            <div class="form-group">
                <label>Status</label>
                <select id="taskStatusInput">
                    <option value="todo" selected>To Do</option>
                    <option value="progress">In Progress</option>
                    <option value="done">Done</option>
                </select>
            </div>
            <div class="form-group">
                <label>Priority</label>
                <select id="taskPriorityInput">
                    <option value="low">Low</option>
                    <option value="medium" selected>Medium</option>
                    <option value="high">High</option>
                </select>
            </div>
            <div class="form-group">
                <label>Category/Tag</label>
                <input type="text" id="taskCategoryInput" placeholder="e.g., Finance, Personal, Client">
            </div>
            <div class="form-group">
                <label>Notes</label>
                <textarea id="taskNotesInput" placeholder="Additional details..."></textarea>
            </div>
            <div class="modal-buttons">
                <button class="btn btn-primary" onclick="addTask()">Add Task</button>
                <button class="btn btn-secondary" onclick="closeTaskModal()">Cancel</button>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
